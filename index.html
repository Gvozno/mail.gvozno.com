<!DOCTYPE html>
<html lang="en" style="background-color: #050505;">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow">
    
    <script>
        (function() {
            var l = (navigator.languages?.[0] || navigator.language || 'en').toLowerCase();
            var target = l.startsWith('ru') ? '/ru/' : '/en/';
            window.location.replace(target);
        })();
    </script>

    <meta http-equiv="refresh" content="0; url=/en/">
    
    <style>body { background: #050505; margin: 0; }</style>
</head>

<body></body>

</html>
