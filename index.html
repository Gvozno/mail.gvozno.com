<!DOCTYPE html>
<html lang="en" style="background:#050505">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    
    <script>
        (function() {
            const lang = (
                navigator.languages?.[0] ||
                navigator.language ||
                navigator.userLanguage ||
                'en'
            ).toLowerCase().slice(0,2);

            const target = lang === 'ru' ? '/ru/' : '/en/';
            
            window.location.replace(target);
        })();
    </script>

    <meta http-equiv="refresh" content="0; url=/en/">

    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: system-ui, sans-serif;
        }
        noscript {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            color: #aaa;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <noscript>
        <p>Пожалуйста, включите JavaScript или перейдите вручную:<br>
           <a href="/en/" style="color:#fff">English version</a> | 
           <a href="/ru/" style="color:#fff">Русская версия</a>
        </p>
    </noscript>
</body>
</html>
